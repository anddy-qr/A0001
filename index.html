<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identificación QR</title>

  <!-- FUENTE GOOGLE -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- ESTILOS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER: muestra el logo arriba -->
  <div class="header">
    <h1></h1>
  </div>

  <!-- NOMBRE: cambia el texto aquí -->
  <div class="nombre-container">
    <h2 id="nombre">
      AYUDAME A REGRESAR A CASA<br>
      Nombre
    </h2>
  </div>

  <!-- FOTO: cambia "foto.jpg" por el nombre de tu imagen -->
  <div id="clienteFotoContainer">
    <img id="clienteFoto" src="foto.jpg" alt="">
  </div>

  <!-- BOTONES -->
  <div class="container">

    <!-- BOTÓN PRINCIPAL: cambia el número 51999999999 por el tuyo -->
    <a class="btn"
       href="https://wa.me/51999999999?text=Hola%20encontre%20tu%20objeto"
       target="_blank"
       rel="noopener noreferrer">
       💬 Escríbeme por WhatsApp
    </a>

    <!-- BOTÓN SECUNDARIO: cambia el número 51988888888 por el tuyo -->
    <a class="btn btn-secundario"
       href="https://t.me/registrarQR?text=Hola%20quiero%20registrar%20mi%20QR
       %0AID:A0001
       %0ANOMBRE:%0ADNI:%0AN⁰WSP:%0AFOTO:"
       target="_blank"
       rel="noopener noreferrer">
       ⚙️ Registrar mi QR
    </a>

  </div>

  <script src="script.js"></script>
</body>
</html>
